<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>animal ages conventer</title>
    <script src="home.js"></script>
    <script>
        let years =[];
        function startPage(){
            //first calculated object
            years[0]= new humanToDog();
            years[1]= new dogToHuman();
            years[2]= new humanToCat();
            years[3]= new catToHuman();
            years[4]= new humanToRabbit();
            years[5]= new rabbitToHuman();
            years[6]= new humanToHamster();
            years[7]= new hamsterToHuman();
            
            yearsCalcularor(0);
        }
        function yearsCalcularor(){
            //get dropdown element
            const select=document.getElementById("yearsSelect");
            //we ask which option is selected
            const idx=select.selectedIndex;
            //pick the calculator object from the array
            const year=years[idx];
            const type1=document.getElementById("type1");
            const type2=document.getElementById("type2");
            const answer=document.getElementById("answer");
            type1.innerText=year.inputUnit1();
            type2.innerText=year.outputUnit();
            answer.innerText="";
            const input=document.getElementById("input");
            input.value="";
            
        }

        function buttonClick(){
            //get dropdown element
        const select=document.getElementById("yearsSelect");
        //get input element
        const input=document.getElementById("input");
        //get answer element
        const answer=document.getElementById("answer");
        //we pick the correct calculator object
        const year=years[select.selectedIndex];
        //read the numeric value
        const value=input.valueAsNumber;
        answer.innerText=year.calculate(value).toFixed(2);
        }
        
    </script>  
</head>
<h1>Pet ages calculator</h1>
    <p>Calculate your age in your pet's years or your pet's age in human years</p><hr>
<body onload="startPage()">
    <input type="number" id="input" onchange="buttonClick()">
    <span id="type1"></span>
    <input type="button" value="=" onclick="buttonClick()"/>&nbsp;
    <span id="answer"></span>
    <span id="type2"></span><br>

    <select id="yearsSelect" onchange="activateCalculator()">
    <option value="">Human years to dog years</option>
    <option value="">Dog years to human years</option>
    <option value="">Human years to cat years</option>
    <option value="">Cat years to human years</option>
    <option value="">Human years to rabbit years</option>
    <option value="">Rabbit years to human years</option>
    <option value="">Human years to hamster years</option>
    <option value="">Hamster years to human years</option>
    
</body>
</html>
