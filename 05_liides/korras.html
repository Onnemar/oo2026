<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Weaving calculators (home)</title>
    <script src="home.js"></script>
    <script>

        let kangas1 =[];
        let kangas3 =[];
        function startPage(){
            //first calculated object
            kangas1[0]= new density();
            kangas1[1]= new warpLen();

            fabCalc1();


        }

       function fabCalc1(){
            //get dropdown element
            const select=document.getElementById("kan1Select");
            //we ask which option is selected
            const idx=select.selectedIndex;
            //pick the calculator object from the array
            const kangas=kangas1[idx];
            const type1=document.getElementById("type1");
            const type11=document.getElementById("type11");
            const answer1=document.getElementById("answer1");
            type1.innerText=kangas.inputUnit1();
            type11.innerText=kangas.outputUnit1();
            answer1.innerText="";
            const input1=document.getElementById("input1");
            input1.value="";
            
        }
        


        function buttonClick1(){
            //get dropdown element
        const select=document.getElementById("kan1Select");
        //get input element
        const input1=document.getElementById("input1");
        //get answer element
        const answer1=document.getElementById("answer1");
        //we pick the correct calculator object
        const kan1=kangas1[select.selectedIndex];
        //read the numeric value
        const value=input1.valueAsNumber;
        answer1.innerText=kan1.calculate(value).toFixed(1);
        
        }


        
    </script>
</head>
<body onload="startPage()">
   <div>
    <input type="number" id="input1" onchange="buttonClick1()">
    <span id="type1"></span>
    <input type="button" value="=" onclick="buttonClick1()">
    <span id="answer1"></span>
    <span id="type11"></span>
    <br>

    

    <select id="kan1Select" onchange="fabCalc1()">
    <option value="">Fabric density</option>
    <option value="">Full lenght</option>
    </select>
</div>




</body>
</html>
