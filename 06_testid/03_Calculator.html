<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    
    <script>
        let calcobj=null;
        let exports={};
        function startPage(){
            calcobj=new Calculator();
            document.getElementById("panel1").innerText=calcobj.getPanelContent();
        }
        //this functions runs every time we press a button
        function buttonPress(){
            //(ev.target.value) value of the click button
            //if the button is 5. then value is 5
        calcobj.pressButton(ev.target.value);
        //update display with text
        document.getElementById("panel1").innerText=calcobj.getPanelContent();
        }
    window.startPage=startPage;
    window.buttonPress=buttonPress;
</script>
<script src="03_Calculator.js"></script>
    <style>
        input[type=button]{width: 50px}
        #panel1{width: 157px;
            height: 20px;
            margin-bottom: 10px;
            border: 1px, solid black;}
    </style>

</head>
<body onload="startPage()">
    <div id="panel1"></div>

    <input type="button" value="1" onclick="buttonPress(ev)"/>
    <input type="button" value="2" onclick="buttonPress(ev)"/>
    <input type="button" value="3" onclick="buttonPress(ev)"/><br/>
    <input type="button" value="4" onclick="buttonPress(ev)"/>
    <input type="button" value="5" onclick="buttonPress(ev)"/>
    <input type="button" value="6" onclick="buttonPress(ev)"/><br>
    <input type="button" value="7" onclick="buttonPress(ev)"/>
    <input type="button" value="8" onclick="buttonPress(ev)"/>
    <input type="button" value="9" onclick="buttonPress(ev)"/><br/>
    <input type="button" value="0" onclick="buttonPress(ev)"/>
    <input type="button" value="C" onclick="buttonPress(ev)"/>
</body>
</html>
