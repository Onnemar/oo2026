<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kettle</title>

    <script src="kettle.js"></script>
    <script>
        let water= null;
        function startPage(){
            document.getElementById("output").innerText="No water has been added yet"
        }
        function startHeater(){
            const ammount= document.getElementById("ammount").valueAsNumber;
            const temp=document.getElementById("temp").valueAsNumber;
            const power=document.getElementById("power").valueAsNumber;


            if (isNaN(ammount)||isNaN(temp)||isNaN(power)){
                document.getElementById("output").innerText="Please fill all the filds before starting";
                return;
            }

            water= new Water (ammount,temp);
            water.setHeatingPower(power);
            document.getElementById("output").innerText=`Water added to the kettle and the current temperature is: ${water.getTemperature().toFixed(2)}c°`;
        }
        function heatOneSecond(){
            
            if (!water){
                document.getElementById("output").innerText="Please fill all the filds before starting";
                return;
            }

            water.heatPerSecond();
            document.getElementById("output").innerText=`New temperaure is: ${water.getTemperature().toFixed(2)}`;
        }
        function calculateTime(){
            const targetTemp=document.getElementById("targetTemp").valueAsNumber;
            let time= water.calculateHeatingTime(targetTemp);
            document.getElementById("output").innerText=`New temperature is: ${time.toFixed(2)} seconds`;
        }
    </script>
</head>
<body onload="startPage()">
    <h1>Water heating demo</h1>
    <label>Water ammount (in grams)</label>
    <input type="number" id="ammount" min="0"><br>
    
    <label>Initial temperature</label>
    <input type="number" id="temp" min="0"><br>

    <label>Heating power</label>
    <input type="number" id="power" min="0"><br>

    <input type="button" value="start Heater" onclick="startHeater()"><br>
    <button onclick="heatOneSecond()">Heat 1 second</button>
    <label> Target temperature</label>
    <input type="number" id="targetTemp" min="0">
    <input type="button" value="Calculate heating time" onclick="calculateTime()"><br>
    <h2 id="output"></h2>
</body>
</html>
